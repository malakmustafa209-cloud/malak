<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mkharrm | Elegant Minimalist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background-color: #ffffff; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-bg {
            position: relative;
            width: 100%; 
            height: 70vh; 
            background-image: url('photo_2026-05-02_00-11-33.jpg'); 
            background-size: cover; 
            background-position: center; 
            z-index: 1;
            opacity: 0.6; 
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        /* الحاوية توا موجودة في الأسفل بعيداً عن تقاطع الصورة */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            background-color: #ffffff;
        }

        .brand {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem; /* خط صغير وناعم */
            font-weight: 300; 
            color: #b59e6f; /* اللون الذهبي المطفي اللي اخترتيه */
            margin-bottom: 30px;
            letter-spacing: 7px; 
            text-align: center;
            text-transform: uppercase;
        }

        .enter-btn {
            padding: 12px 60px;
            background-color: transparent;
            color: #b59e6f;
            border: 1px solid #b59e6f;
            font-family: 'Cinzel', serif;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 5px;
            transition: all 0.4s ease;
            cursor: pointer;
            text-transform: uppercase;
        }

        .enter-btn:hover {
            background-color: #b59e6f;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="container">
        <div class="brand">WELCOME TO THE WORLD OF MKHARRM</div>
        <a href="page2.html" class="enter-btn">ENTER STORE</a>
    </div>

</body>
</html>
